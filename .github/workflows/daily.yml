name: Günlük Rapor

on:
  # NOT: GitHub scheduled workflow'ları "best-effort" kuyruğa alır. Dakika :00
  # (tepe saat) en sıkışık slottur; yoğun saatlerde tetiklenmeler saatlerce
  # gecikir, hatta tamamen DÜŞÜRÜLÜR. Bu yüzden:
  #   1) dakika :00 yerine düzensiz bir dakika (:23) kullanılır,
  #   2) denemeler 06:23–20:53 UTC arasına geniş yayılır (8 deneme),
  # böylece slotlardan biri düşse bile bir sonraki yakalar. main.py idempotenttir:
  # AYNI GÜN içinde CRON başarılı bir rapor ürettiyse (data/cron_basarili.txt işareti)
  # sonraki cron slotları hemen çıkar. Manuel (workflow_dispatch) tetikleme bu işareti
  # KOYMAZ; dolayısıyla elle çalıştırma yapılsa bile cron saati gelince cron yine çalışır.
  # Rapor fallback'se işaret yazılmaz → bir sonraki cron slotu yeniden dener (Kontrol 1).
  schedule:
    - cron: '23 6 * * *'    # 1. deneme — 06:23 UTC
    - cron: '23 8 * * *'    # 2. deneme — 08:23 UTC
    - cron: '23 10 * * *'   # 3. deneme — 10:23 UTC
    - cron: '23 12 * * *'   # 4. deneme — 12:23 UTC
    - cron: '23 14 * * *'   # 5. deneme — 14:23 UTC
    - cron: '23 16 * * *'   # 6. deneme — 16:23 UTC
    - cron: '23 18 * * *'   # 7. deneme — 18:23 UTC
    - cron: '53 20 * * *'   # 8. deneme — 20:53 UTC (son güvenlik ağı)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai
          pip install -r requirements.txt
      
      - env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          # OpenRouter (Gemini 3.5 Flash) — AKTİF. Gemini API devre dışı.
          LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: python -u main.py
      
      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/ docs/
          git diff-index --quiet HEAD || git commit -m "📰 $(date +'%Y-%m-%d')"
          git pull --rebase origin main || git pull origin main
          git push
