name: Günlük Rapor

on:
  schedule:
    - cron: '0 07 * * *'   # 1. deneme  — 07:00 UTC
    - cron: '0 08 * * *'   # 2. deneme  — 08:00 UTC (Gemini başarısız olduysa)
    - cron: '0 09 * * *'   # 3. deneme  — 09:00 UTC
    - cron: '0 10 * * *'   # 4. deneme  — 10:00 UTC
    - cron: '0 11 * * *'   # 5. deneme  — 11:00 UTC
    - cron: '0 12 * * *'   # 6. deneme  — 12:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai
          pip install -r requirements.txt
      
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u main.py
      
      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/ docs/
          git diff-index --quiet HEAD || git commit -m "📰 $(date +'%Y-%m-%d')"
          git pull --rebase origin main || git pull origin main
          git push
