name: Günlük Rapor

on:
  # ─────────────────────────────────────────────────────────────────────────
  # GÜNLÜK OTOMATİK ÜRETİM — ama GÜNDE EN FAZLA 1 BAŞARILI RAPOR.
  #
  # GitHub scheduled workflow'ları "best-effort"tur: yoğun saatlerde gecikir,
  # hatta düşürülür (özellikle sabah UTC slotları). Bu yüzden gün içine yayılmış
  # 8 deneme + harici zamanlayıcıdan (cron-job.org) repository_dispatch kullanılır.
  #
  # KURŞUNGEÇİRMEZ IDEMPOTENCY (bkz. main.py Kontrol 1): O gün için BAŞARILI rapor
  # dosyası (docs/raporlar/<bugün>.html) ZATEN varsa, sonraki tüm otomatik
  # çalışmalar HEMEN çıkar — raporun ÜZERİNE ASLA YAZILMAZ. Sinyal raporun
  # KENDİSİdir (işaret dosyasına bağlı değil); işaret silinse bile başarılı rapor
  # yeniden üretilmez. Böylece "başarılı rapor otomatik bozulması" imkânsızdır.
  #
  # Manuel (workflow_dispatch) çalıştırma bu atlamaya TABİ DEĞİLDİR: elle "Run
  # workflow" her zaman TAZE rapor üretir (bilinçli eylem).
  # ─────────────────────────────────────────────────────────────────────────
  schedule:
    - cron: '23 6 * * *'    # 1. deneme — 06:23 UTC
    - cron: '23 8 * * *'    # 2. deneme — 08:23 UTC
    - cron: '23 10 * * *'   # 3. deneme — 10:23 UTC
    - cron: '23 12 * * *'   # 4. deneme — 12:23 UTC
    - cron: '23 14 * * *'   # 5. deneme — 14:23 UTC
    - cron: '23 16 * * *'   # 6. deneme — 16:23 UTC
    - cron: '23 18 * * *'   # 7. deneme — 18:23 UTC
    - cron: '53 20 * * *'   # 8. deneme — 20:53 UTC (son güvenlik ağı)
  # Harici zamanlayıcı (cron-job.org) bu olayı tetikler — bkz. docs/CRON_SETUP.md
  repository_dispatch:
    types: [scheduled-report]
  workflow_dispatch:

# Aynı anda birden fazla tetikleme gelebilir (schedule + dispatch). concurrency
# aynı anda tek çalıştırmaya izin verir; devam eden yarıda kesilmez, ikinci
# tetikleme sıraya girer ve idempotency ile (başarılı rapor varsa) hemen çıkar.
concurrency:
  group: gunluk-rapor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # OpenRouter (varsayılan model: src/config.py OPENROUTER_MODEL) — AKTİF.
          # Gemini API devre dışı.
          LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: python -u main.py

      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/ docs/
          git diff-index --quiet HEAD || git commit -m "📰 $(TZ='Europe/Istanbul' date +'%Y-%m-%d')"
          git pull --rebase origin main || git pull origin main
          git push
