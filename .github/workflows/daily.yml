name: Günlük Rapor

on:
  # ─────────────────────────────────────────────────────────────────────────
  # SADECE MANUEL TETİKLEME.
  # Rapor YALNIZCA GitHub arayüzünden elle "Run workflow" (workflow_dispatch)
  # ile üretilir. Otomatik tetikleyiciler (schedule + repository_dispatch)
  # KASITLI OLARAK KALDIRILDI.
  #
  # Neden: Zamanlanmış cron slotları, o gün BAŞARILI bir rapor zaten varken bile
  # tekrar çalışıp raporu yeniden üretebiliyordu (idempotency işareti temizlenirse
  # veya manuel rapor işaret koymadığı için). Bu, 2026-07-01'de raporun aynı-gün
  # dedup çöküşüyle BOŞALMASINA yol açtı. Manuel-tek tetikleme ile "otomatik
  # yeniden üretim" artık İMKÂNSIZDIR; her rapor bilinçli bir manuel eylemdir.
  #
  # (Geçmiş: 8 GitHub schedule slotu 06:23–20:53 UTC + cron-job.org üzerinden
  #  repository_dispatch[scheduled-report] vardı; ikisi de kaldırıldı.)
  # ─────────────────────────────────────────────────────────────────────────
  workflow_dispatch:

# Elle iki kez üst üste tetiklenirse aynı anda iki çalıştırma olmasın (git push
# çakışmasını önler); devam eden çalıştırma yarıda kesilmez, ikincisi sıraya girer.
concurrency:
  group: gunluk-rapor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai
          pip install -r requirements.txt

      - env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          # OpenRouter (Gemini 3.5 Flash) — AKTİF. Gemini API devre dışı.
          LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: python -u main.py

      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/ docs/
          git diff-index --quiet HEAD || git commit -m "📰 $(date +'%Y-%m-%d')"
          git pull --rebase origin main || git pull origin main
          git push
