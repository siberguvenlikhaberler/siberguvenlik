name: Günlük Rapor

on:
  # ─────────────────────────────────────────────────────────────────────────
  # GÜNLÜK OTOMATİK ÜRETİM — ama GÜNDE EN FAZLA 1 BAŞARILI RAPOR.
  #
  # GitHub'ın kendi `schedule`'ı ÜÇ slotta doğrudan tetikler (TR 12:00, 13:00,
  # 14:00 = UTC 09:00, 10:00, 11:00). Ayrıca harici cron-job.org da aynı
  # slotlarda repository_dispatch gönderebilir (bkz. docs/CRON_SETUP.md) —
  # ikisi çakışsa bile sorun olmaz (aşağıdaki concurrency + Kontrol 1).
  #
  # KURŞUNGEÇİRMEZ IDEMPOTENCY (bkz. main.py Kontrol 1): O gün için BAŞARILI rapor
  # dosyası (docs/raporlar/<bugün>.html) ZATEN varsa, sonraki tüm otomatik
  # çalışmalar HEMEN çıkar — raporun ÜZERİNE ASLA YAZILMAZ. Sinyal raporun
  # KENDİSİdir (işaret dosyasına bağlı değil); işaret silinse bile başarılı rapor
  # yeniden üretilmez. Böylece "başarılı rapor otomatik bozulması" imkânsızdır.
  #
  # Manuel (workflow_dispatch) çalıştırma bu atlamaya TABİ DEĞİLDİR: elle "Run
  # workflow" her zaman TAZE rapor üretir (bilinçli eylem).
  # ─────────────────────────────────────────────────────────────────────────
  schedule:
    - cron: '0 9 * * *'    # TR 12:00
    - cron: '0 10 * * *'   # TR 13:00
    - cron: '0 11 * * *'   # TR 14:00
  # Asıl tetikleyici: harici cron-job.org bu olayı gönderir — bkz. docs/CRON_SETUP.md
  repository_dispatch:
    types: [scheduled-report]
  workflow_dispatch:
    inputs:
      reset_today:
        description: "Bugünün raporunu SIFIRDAN yeniden üret (durum reset: ham + linkler/arşiv bugün + rapor silinir)"
        type: boolean
        default: false

# schedule (yedek) ile repository_dispatch (cron-job.org) çakışabilir: örn. yedek
# slot gecikince asıl tetiklemeyle aynı ana denk gelebilir; her ikisi de
# cron_basarili.txt işaretini henüz görmeden rapor üretip git push'ta çakışabilir.
# concurrency grubu aynı anda tek bir çalıştırmaya izin verir (cancel-in-progress:
# false → devam eden raporu yarıda kesmeyiz, ikinci tetikleme sıraya girer ve
# idempotency'yle erken çıkar).
concurrency:
  group: gunluk-rapor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # OpenRouter (varsayılan model: src/config.py OPENROUTER_MODEL) — AKTİF.
          # Gemini API devre dışı.
          LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          # Elle "Run workflow" → reset_today işaretlenirse bugünü sıfırdan üretir.
          # Otomatik cron/dispatch'te input gelmez → boş → reset ÇALIŞMAZ.
          RESET_TODAY: ${{ github.event.inputs.reset_today }}
        run: python -u main.py

      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/ docs/
          git diff-index --quiet HEAD || git commit -m "📰 $(TZ='Europe/Istanbul' date +'%Y-%m-%d')"
          git pull --rebase origin main || git pull origin main
          git push
